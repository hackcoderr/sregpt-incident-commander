<!DOCTYPE html>
<html>
<head>
    <title>SREGPT 🚀</title>

    <!-- Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- Highlight.js -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/build/highlight.min.js"></script>

    <style>
        body {
            margin: 0;
            display: flex;
            background: #0f172a;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        /* 🔥 SIDEBAR */
        .sidebar {
            width: 260px;
            background: #020617;
            height: 100vh;
            padding: 15px;
            border-right: 1px solid #1e293b;
            overflow-y: auto;
        }

        .new-chat {
            background: #22c55e;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .chat-item {
            padding: 10px;
            background: #1e293b;
            margin-bottom: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-item:hover {
            background: #334155;
        }

        .chat-item.active {
            background: #38bdf8;
            color: black;
        }

        .delete-btn {
            display: none;
            color: #ef4444;
            cursor: pointer;
        }

        .chat-item:hover .delete-btn {
            display: inline;
        }

        /* 🔥 MAIN */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            padding: 18px;
            text-align: center;
            background: #020617;
            border-bottom: 1px solid #1e293b;
            font-size: 26px;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #fbfbfb; /* 🔥 highlight color */
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 40px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            padding-bottom: 140px;
        }

        .message {
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
        }

        .user {
            background: #1e293b;
            text-align: right;
        }

        .bot {
            background: #020617;
            border-left: 3px solid #38bdf8;
        }

        /* 🔥 INPUT FIX */
        .input-area {
            position: fixed;
            bottom: 0;
            left: 260px;
            right: 0;
            background: #020617;
            border-top: 1px solid #1e293b;
            padding: 16px 0;
            z-index: 100;
            display: flex;
            justify-content: center;
        }

        .input-wrapper {
            width: 100%;
            max-width: 900px;
            display: flex;
            gap: 10px;
            padding: 8px;
            background: #1e293b;
            border-radius: 14px;
            box-shadow: 0 0 0 1px #334155;
        }

        input {
            flex: 1;
            padding: 14px;
            border-radius: 10px;
            border: none;
            background: transparent;
            color: white;
            outline: none;
        }

        button {
            padding: 12px 18px;
            background: #22c55e;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            color: white;
        }

        /* 🔥 CODE */
        pre {
            background: #0d1117;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            position: relative;
        }

        .copy-btn {
            position: absolute;
            right: 10px;
            top: 6px;
            background: #238636;
            border: none;
            padding: 5px;
            cursor: pointer;
            border-radius: 5px;
            color: white;
        }

        .ticket {
            background: #1e293b;
            padding: 4px 8px;
            border-radius: 6px;
            color: #22c55e;
        }

        .confidence {
            background: #09658c;
            color: black;
            padding: 3px 6px;
            border-radius: 6px;
        }
        h1, h2, h3 {
            color: #58a6ff;
        }
     
      
    </style>
</head>

<body>

<div class="sidebar">
    <div class="new-chat" onclick="newChat()">➕ New Chat</div>
    <div id="history"></div>
</div>

<div class="main">
    <div class="header">🤖 SREGPT — Intelligent SRE Assistant 🚀</div>
    <div id="chat" class="chat-container"></div>
</div>

<div class="input-area">
    <div class="input-wrapper">
        <input id="query" placeholder="Ask your SRE issue..."
            onkeydown="if(event.key==='Enter') send()">
        <button onclick="send()">Send</button>
    </div>
</div>

<script>

let chats = JSON.parse(localStorage.getItem("sregpt_chats") || "[]");
let activeChatIndex = localStorage.getItem("active_chat_index");
activeChatIndex = activeChatIndex !== null ? Number(activeChatIndex) : null;
let currentChat = [];

function saveChats() {
    localStorage.setItem("sregpt_chats", JSON.stringify(chats));
    localStorage.setItem("active_chat_index", activeChatIndex);
}

function syncCurrentChat() {
    if (activeChatIndex === null) return;
    chats[activeChatIndex] = currentChat;
}

function renderHistory() {
    const history = document.getElementById("history");
    history.innerHTML = "";

    chats.forEach((chat, i) => {
        const div = document.createElement("div");
        div.className = "chat-item";

        if (i === activeChatIndex) div.classList.add("active");

        const title = document.createElement("span");
        title.innerText = chat[0]?.text.slice(0, 25) || "New Chat";
        title.onclick = () => loadChat(i);

        const del = document.createElement("span");
        del.innerText = "🗑";
        del.className = "delete-btn";
        del.onclick = (e) => {
            e.stopPropagation();
            deleteChat(i);
        };

        div.appendChild(title);
        div.appendChild(del);
        history.appendChild(div);
    });
}

function loadChat(index) {
    currentChat = chats[index];
    activeChatIndex = index;
    saveChats();
    renderChat();
    renderHistory();
}

function newChat() {
    currentChat = [];
    activeChatIndex = null;
    saveChats();
    renderChat();
    renderHistory();
}

function deleteChat(index) {
    if (!confirm("Delete this chat?")) return;

    chats.splice(index, 1);

    if (activeChatIndex === index) {
        activeChatIndex = chats.length > 0 ? 0 : null;
    } else if (activeChatIndex !== null && activeChatIndex > index) {
        activeChatIndex -= 1;
    }

    currentChat = activeChatIndex !== null ? chats[activeChatIndex] : [];
    saveChats();
    renderChat();
    renderHistory();
}

function renderChat() {
    const chatDiv = document.getElementById("chat");
    chatDiv.innerHTML = "";

    currentChat.forEach(msg => {
        const div = document.createElement("div");
        div.className = "message " + msg.type;

        if (msg.type === "bot") {
            div.innerHTML = renderMarkdown(msg.text);
        } else {
            div.innerText = msg.text;
        }

        chatDiv.appendChild(div);
    });

    chatDiv.scrollTop = chatDiv.scrollHeight;
}

function renderMarkdown(text) {
    let html = marked.parse(text);

    html = html.replace(/SREQ-\d+/g, m =>
        `<span class="ticket">🎫 ${m}</span>`
    );

    html = html.replace(/Confidence: (\d+%)/g, (m, val) =>
        `Confidence: <span class="confidence">${val}</span>`
    );

    html = html.replace(/<pre><code class="language-(.*?)">/g, () =>
        `<pre><button class="copy-btn" onclick="copyCode(this)">Copy</button><code>`
    );

    setTimeout(() => {
        if (window.hljs) {
            document.querySelectorAll("pre code").forEach(block => {
                hljs.highlightElement(block);
            });
        }
    }, 0);

    return html;
}

function copyCode(btn) {
    const code = btn.nextElementSibling.innerText;
    navigator.clipboard.writeText(code);
    btn.innerText = "Copied!";
}

async function send() {
    const input = document.getElementById("query");
    const question = input.value.trim();
    if (!question) return;

    if (activeChatIndex === null) {
        currentChat = [];
        chats.push(currentChat);
        activeChatIndex = chats.length - 1;
    }

    currentChat.push({ type: "user", text: question });
    syncCurrentChat();
    saveChats();
    renderChat();

    const botMsg = { type: "bot", text: "" };
    currentChat.push(botMsg);
    syncCurrentChat();
    saveChats();
    renderChat();

    input.value = "";

    const response = await fetch(
        `http://127.0.0.1:8000/ask-stream?query=${encodeURIComponent(question)}`
    );

    const reader = response.body.getReader();
    const decoder = new TextDecoder();

    while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const chunk = decoder.decode(value);
        botMsg.text += chunk;
        syncCurrentChat();
        renderChat();
    }

    syncCurrentChat();
    saveChats();
    renderHistory();
}

function init() {
    if (chats.length > 0) {
        if (activeChatIndex !== null && chats[activeChatIndex]) {
            currentChat = chats[activeChatIndex];
        } else {
            currentChat = chats[0];
            activeChatIndex = 0;
        }
    }

    renderChat();
    renderHistory();
}

init();

</script>

</body>
</html>
